<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Accelerator | Pipeline de Producción</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        code, pre, .font-mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 antialiased min-h-screen flex flex-col selection:bg-zinc-800 selection:text-emerald-400" x-data="courseApp()">

    <!-- BARRA SUPERIOR DE INGENIERÍA -->
    <header class="bg-zinc-900 border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-zinc-800 border border-zinc-700 text-emerald-400 font-mono text-xs px-2.5 py-1 rounded">
                    SYS.OPS // 2026
                </div>
                <div class="h-4 w-px bg-zinc-800"></div>
                <div>
                    <h1 class="font-bold text-zinc-100 text-sm tracking-tight font-mono">DevOps Accelerator</h1>
                    <p class="text-[11px] text-zinc-400">Miguel Ibarra — M.Ed & Senior DevOps Engineer</p>
                </div>
            </div>

            <!-- Tracker estilo consola -->
            <div class="flex items-center gap-3 font-mono text-xs bg-zinc-950 border border-zinc-800 px-3 py-1.5 rounded">
                <span class="text-zinc-400">AVANCE:</span>
                <div class="w-24 bg-zinc-800 h-1.5 rounded-none overflow-hidden">
                    <div class="bg-emerald-500 h-full transition-all duration-200" :style="`width: ${progressPercentage}%`"></div>
                </div>
                <span class="text-emerald-400 font-bold" x-text="`${progressPercentage}%`"></span>
            </div>
        </div>
    </header>

    <!-- PANEL PRINCIPAL -->
    <div class="flex-1 max-w-7xl w-full mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6 p-4 md:p-6">
        
        <!-- NAVEGACIÓN LATERAL DE MÓDULOS -->
        <aside class="lg:col-span-4 xl:col-span-3 space-y-2">
            <div class="bg-zinc-900 border border-zinc-800 rounded-md p-3 sticky top-16">
                <div class="flex items-center justify-between pb-3 mb-3 border-b border-zinc-800 text-xs font-mono text-zinc-400">
                    <span>SECUENCIA DE PIPELINE</span>
                    <span x-text="`${completedModules.length}/${modules.length}`"></span>
                </div>
                <nav class="space-y-1">
                    <template x-for="(module, index) in modules" :key="module.id">
                        <button 
                            @click="currentModule = index"
                            :class="currentModule === index ? 'bg-zinc-800 border-l-2 border-l-emerald-500 text-zinc-100' : 'hover:bg-zinc-800/50 border-l-2 border-l-transparent text-zinc-400'"
                            class="w-full text-left px-3 py-2.5 rounded-r-md transition-all flex items-center justify-between text-xs">
                            <div class="flex items-center gap-2.5">
                                <span 
                                    :class="completedModules.includes(module.id) ? 'text-emerald-400 font-bold' : 'text-zinc-400'"
                                    class="font-mono"
                                    x-text="completedModules.includes(module.id) ? '[✓]' : `[0${index + 1}]`">
                                </span>
                                <span class="font-medium truncate max-w-[170px]" x-text="module.shortTitle"></span>
                            </div>
                        </button>
                    </template>
                </nav>
            </div>
        </aside>

        <!-- CONTENIDO DEL DOCUMENTO -->
        <main class="lg:col-span-8 xl:col-span-9 space-y-6">
            <template x-if="modules[currentModule]">
                <div class="bg-zinc-900 border border-zinc-800 rounded-md p-6 md:p-8 space-y-6">
                    
                    <!-- Encabezado técnico -->
                    <div class="border-b border-zinc-800 pb-5">
                        <div class="flex items-center gap-2 mb-2 font-mono text-xs">
                            <span class="text-emerald-400 bg-emerald-950/60 border border-emerald-800/60 px-2 py-0.5 rounded-sm" x-text="`FASE_0${currentModule + 1}`"></span>
                            <span class="text-zinc-400" x-text="`ESTIMADO: ${modules[currentModule].duration}`"></span>
                        </div>
                        <h2 class="text-xl md:text-2xl font-bold text-zinc-100 tracking-tight" x-text="modules[currentModule].title"></h2>
                        <p class="text-zinc-400 text-xs md:text-sm mt-2 leading-relaxed" x-text="modules[currentModule].description"></p>
                    </div>

                    <!-- Prerrequisitos -->
                    <div class="bg-zinc-950 border border-zinc-800 p-4 rounded-md space-y-1.5 font-mono text-xs">
                        <div class="text-zinc-300 font-bold flex items-center gap-2">
                            <span class="text-amber-400">!</span> PRERREQUISITOS DE ENTORNO:
                        </div>
                        <div class="text-zinc-400 leading-relaxed font-sans" x-html="modules[currentModule].prerequisites"></div>
                    </div>

                    <!-- Fundamento Técnico -->
                    <div class="space-y-2">
                        <h3 class="text-xs font-mono font-bold text-zinc-400 uppercase tracking-wider">// Fundamento Arquitectónico</h3>
                        <p class="text-zinc-300 text-xs md:text-sm leading-relaxed bg-zinc-950/50 p-4 border border-zinc-800/80 rounded-md" x-html="modules[currentModule].concept"></p>
                    </div>

                    <!-- Pasos del Laboratorio -->
                    <div class="space-y-4">
                        <h3 class="text-xs font-mono font-bold text-zinc-400 uppercase tracking-wider">// Ejecución Guiada</h3>
                        
                        <div class="space-y-3">
                            <template x-for="(step, sIndex) in modules[currentModule].steps" :key="sIndex">
                                <div class="bg-zinc-950 border border-zinc-800 rounded-md p-4 space-y-2.5">
                                    <div class="flex items-baseline justify-between">
                                        <span class="text-xs font-bold text-zinc-200 font-mono" x-text="`PASO 0${sIndex + 1}: ${step.title}`"></span>
                                    </div>
                                    <p class="text-xs text-zinc-400 leading-relaxed" x-text="step.explanation"></p>
                                    
                                    <template x-if="step.code">
                                        <div class="bg-black border border-zinc-800 rounded p-3 font-mono text-xs overflow-x-auto">
                                            <div class="text-zinc-400 mb-1 select-none">$ execution_cmd:</div>
                                            <pre class="text-emerald-400 leading-relaxed"><code x-text="step.code"></code></pre>
                                        </div>
                                    </template>
                                    
                                    <div class="text-[11px] font-mono text-zinc-400 bg-zinc-900/60 p-2 border border-zinc-800/50 rounded flex items-center gap-2">
                                        <span class="text-emerald-400">→</span>
                                        <span>Validación: <strong class="text-zinc-300" x-text="step.validation"></strong></span>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- Autoevaluación estilo consola -->
                    <div class="bg-zinc-950 border border-zinc-800 p-5 rounded-md space-y-3">
                        <div class="text-xs font-mono text-zinc-300 font-bold flex items-center gap-2">
                            <i data-lucide="terminal" class="w-3.5 h-3.5 text-emerald-400"></i>
                            <span>CHECKPOINT_DE_CONTROL</span>
                        </div>
                        <p class="text-xs text-zinc-300" x-text="modules[currentModule].quiz.question"></p>
                        
                        <div class="space-y-1.5 font-mono text-xs">
                            <template x-for="(option, oIndex) in modules[currentModule].quiz.options" :key="oIndex">
                                <button 
                                    @click="selectQuizOption(oIndex)"
                                    :class="quizAnswer === oIndex ? (oIndex === modules[currentModule].quiz.correct ? 'bg-emerald-950 border-emerald-600 text-emerald-300' : 'bg-red-950 border-red-600 text-red-300') : 'bg-zinc-900 border-zinc-800 text-zinc-400 hover:text-zinc-200 hover:border-zinc-700'"
                                    class="w-full text-left p-2.5 rounded border transition-all flex items-center gap-2">
                                    <span class="text-zinc-400" x-text="`[${oIndex + 1}]`"></span>
                                    <span x-text="option"></span>
                                </button>
                            </template>
                        </div>
                        <template x-if="quizFeedback">
                            <div class="text-xs font-mono p-2 rounded border mt-2" :class="isQuizCorrect ? 'bg-emerald-950/40 border-emerald-800 text-emerald-400' : 'bg-red-950/40 border-red-800 text-red-400'" x-text="quizFeedback"></div>
                        </template>
                    </div>

                    <!-- Crecimiento / Next Steps -->
                    <div class="border-t border-zinc-800 pt-5 space-y-2">
                        <h4 class="text-xs font-mono text-zinc-400 font-bold uppercase">// Profundización para Perfil Senior</h4>
                        <ul class="space-y-1 font-mono text-xs text-zinc-400">
                            <template x-for="item in modules[currentModule].nextSteps" :key="item">
                                <li class="flex items-start gap-2">
                                    <span class="text-zinc-400">•</span>
                                    <span x-text="item"></span>
                                </li>
                            </template>
                        </ul>
                    </div>

                    <!-- Botón de avance -->
                    <div class="flex justify-end pt-2">
                        <button 
                            @click="toggleComplete(modules[currentModule].id)"
                            :class="completedModules.includes(modules[currentModule].id) ? 'bg-zinc-800 text-zinc-400 border-zinc-700' : 'bg-emerald-500 hover:bg-emerald-400 text-zinc-950 font-bold'"
                            class="px-5 py-2.5 rounded border border-transparent font-mono text-xs transition-all flex items-center gap-2">
                            <span x-text="completedModules.includes(modules[currentModule].id) ? '[ STATUS: COMPLETADO - HACER CLIC PARA REVERTIR ]' : '[ MARCAR MÓDULO COMO COMPLETADO ]'"></span>
                        </button>
                    </div>

                </div>
            </template>
        </main>
    </div>

    <footer class="border-t border-zinc-800 bg-zinc-950 py-5 text-center font-mono text-xs text-zinc-400 mt-auto">
        <p>DevOps Accelerator 2026 — Autor: <strong>Miguel Ibarra</strong> (Ing. Cibernética & Maestro en Educación)</p>
        <p class="text-zinc-400 text-[11px] mt-1">Infraestructura de aprendizaje alojada en GitHub Pages</p>
    </footer>

    <script>
        document.addEventListener('alpine:init', () => {
            lucide.createIcons();
        });

        function courseApp() {
            return {
                currentModule: 0,
                completedModules: JSON.parse(localStorage.getItem('devops_acc_completed') || '[]'),
                quizAnswer: null,
                quizFeedback: '',
                isQuizCorrect: false,

                get progressPercentage() {
                    return Math.round((this.completedModules.length / this.modules.length) * 100);
                },

                selectQuizOption(index) {
                    this.quizAnswer = index;
                    const correct = this.modules[this.currentModule].quiz.correct;
                    if (index === correct) {
                        this.isQuizCorrect = true;
                        this.quizFeedback = 'OK: Verificación correcta. Concepto asimilado.';
                    } else {
                        this.isQuizCorrect = false;
                        this.quizFeedback = 'FAIL: Respuesta incorrecta. Revisa el código del laboratorio.';
                    }
                },

                toggleComplete(id) {
                    if (this.completedModules.includes(id)) {
                        this.completedModules = this.completedModules.filter(item => item !== id);
                    } else {
                        this.completedModules.push(id);
                    }
                    localStorage.setItem('devops_acc_completed', JSON.stringify(this.completedModules));
                },

                modules: [
                    {
                        id: 'm1',
                        shortTitle: 'Linux & Scripting',
                        title: '1. Entorno Linux, Shell y Scripting Base',
                        duration: '45 min',
                        description: 'Construcción de la aplicación base en Python sin dependencias complejas y automatización de pruebas de estado con scripts en Bash.',
                        prerequisites: 'Terminal de comandos disponible (macOS/Linux Terminal o Windows WSL/PowerShell) con Python 3.x instalado.',
                        concept: 'Los entornos de producción se administran mediante interfaces de texto. Construimos un servidor HTTP mínimo en Python y un script en Bash para validar que el puerto responda correctamente.',
                        steps: [
                            {
                                title: 'Directorio de trabajo aislado',
                                explanation: 'Generación del directorio del proyecto y navegación hacia él.',
                                code: 'mkdir -p ~/proyecto-devops && cd ~/proyecto-devops',
                                validation: 'El comando "pwd" debe terminar en /proyecto-devops.'
                            },
                            {
                                title: 'Código de la aplicación servidor (app.py)',
                                explanation: 'Servidor HTTP nativo en Python escuchando en el puerto 8000.',
                                code: 'cat << \'EOF\' > app.py\nimport http.server\nimport socketserver\n\nPORT = 8000\nHandler = http.server.SimpleHTTPRequestHandler\n\nprint(f"Servidor iniciado en puerto {PORT}")\nwith socketserver.TCPServer(("", PORT), Handler) as httpd:\n    httpd.serve_forever()\nEOF',
                                validation: 'El archivo app.py debe existir en el directorio.'
                            },
                            {
                                title: 'Script de verificación de salud (check.sh)',
                                explanation: 'Script ejecutable que valida el código de respuesta HTTP 200 usando curl.',
                                code: 'cat << \'EOF\' > check.sh\n#!/bin/bash\nRESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000)\nif [ "$RESPONSE" -eq 200 ]; then\n  echo "OK: Servicio respondiendo HTTP 200"\n  exit 0\nelse\n  echo "FAIL: Se obtuvo codigo HTTP $RESPONSE"\n  exit 1\nfi\nEOF\nchmod +x check.sh',
                                validation: 'Los permisos de ejecución quedan asignados con chmod +x.'
                            }
                        ],
                        quiz: {
                            question: '¿Qué función cumple la instrucción "chmod +x check.sh"?',
                            options: [
                                'Asigna permisos de ejecución al archivo en sistemas UNIX/Linux',
                                'Descarga dependencias de Python',
                                'Sube el script a GitHub'
                            ],
                            correct: 0
                        },
                        nextSteps: [
                            'Manejo de permisos POSIX (chmod, chown, octales).',
                            'Redirección de flujos de texto (stdout, stderr, pipes).',
                            'Uso de variables de entorno con export.'
                        ]
                    },
                    {
                        id: 'm2',
                        shortTitle: 'Contenedores Docker',
                        title: '2. Empaquetado de Aplicación con Docker',
                        duration: '60 min',
                        description: 'Creación de imágenes ligeras e independientes para garantizar que la aplicación funcione idénticamente en desarrollo y producción.',
                        prerequisites: 'Motor de Docker instalado y corriendo (comprobar con "docker info").',
                        concept: 'Un contenedor empaqueta el código fuente y el runtime (Python) en un paquete aislado del sistema operativo anfitrión.',
                        steps: [
                            {
                                title: 'Creación del Dockerfile',
                                explanation: 'Receta de construcción basada en la imagen python:3.11-slim.',
                                code: 'cat << \'EOF\' > Dockerfile\nFROM python:3.11-slim\nWORKDIR /app\nCOPY app.py .\nEXPOSE 8000\nCMD ["python", "app.py"]\nEOF',
                                validation: 'Archivo Dockerfile creado en la raíz del proyecto.'
                            },
                            {
                                title: 'Construcción de la imagen',
                                explanation: 'Compilación de la imagen con la etiqueta mi-app:v1.',
                                code: 'docker build -t mi-app:v1 .',
                                validation: 'La imagen aparece al ejecutar "docker images".'
                            },
                            {
                                title: 'Despliegue del contenedor local',
                                explanation: 'Ejecución en segundo plano redirigiendo el puerto 8080 del host al 8000 del contenedor.',
                                code: 'docker run -d -p 8080:8000 --name servicio-web mi-app:v1',
                                validation: '"docker ps" muestra el contenedor activo.'
                            }
                        ],
                        quiz: {
                            question: 'En "docker run -d -p 8080:8000", ¿qué indica "-d"?',
                            options: [
                                'Borra el contenedor al terminar',
                                'Ejecuta el contenedor en segundo plano (detached mode)',
                                'Duplica el puerto'
                            ],
                            correct: 1
                        },
                        nextSteps: [
                            'Uso de .dockerignore para reducir contexto de build.',
                            'Estrategia Multi-stage builds.',
                            'Orquestación con Docker Compose.'
                        ]
                    },
                    {
                        id: 'm3',
                        shortTitle: 'CI/CD GitHub Actions',
                        title: '3. Integración Continua con GitHub Actions',
                        duration: '50 min',
                        description: 'Automatización de builds y ejecución de pruebas cada vez que se envía un commit al repositorio.',
                        prerequisites: 'Repositorio alojado en GitHub con Git configurado.',
                        concept: 'El servidor de CI descarga el código tras cada push, construye la imagen de Docker y ejecuta el script de prueba para prevenir regresiones.',
                        steps: [
                            {
                                title: 'Directorio de workflows',
                                explanation: 'Creación de la ruta requerida por GitHub Actions.',
                                code: 'mkdir -p .github/workflows',
                                validation: 'Ruta .github/workflows lista.'
                            },
                            {
                                title: 'Definición del Pipeline (ci.yml)',
                                explanation: 'Archivo de automatización en formato YAML.',
                                code: 'cat << \'EOF\' > .github/workflows/ci.yml\nname: CI Pipeline\n\non:\n  push:\n    branches: [ "main", "master" ]\n\njobs:\n  test:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n      - name: Build Image\n        run: docker build -t mi-app:${{ github.sha }} .\n      - name: Run App\n        run: docker run -d -p 8000:8000 --name test-app mi-app:${{ github.sha }}\n      - name: Check Status\n        run: |\n          sleep 2\n          chmod +x check.sh\n          ./check.sh\nEOF',
                                validation: 'Al hacer git push, la pestaña "Actions" en GitHub ejecutará el trabajo.'
                            }
                        ],
                        quiz: {
                            question: '¿Qué desencadena la ejecución del pipeline según la cláusula "on: push"?',
                            options: [
                                'Un temporizador diario',
                                'Cualquier commit enviado a las ramas main o master',
                                'Una alerta de correo'
                            ],
                            correct: 1
                        },
                        nextSteps: [
                            'Uso de GitHub Secrets para credenciales.',
                            'Publicación de imágenes en Amazon ECR o Docker Hub.',
                            'Análisis estático de código (Linters).'
                        ]
                    },
                    {
                        id: 'm4',
                        shortTitle: 'Nube AWS EC2',
                        title: '4. Infraestructura Cloud y Servidores AWS',
                        duration: '50 min',
                        description: 'Entendimiento de servidores virtuales EC2, puertos de red y configuración inicial de servidores.',
                        prerequisites: 'Conceptos básicos de redes (IP, puertos, SSH).',
                        concept: 'Un servidor EC2 es una instancia virtualizada en un centro de datos de AWS donde ejecutaremos nuestro contenedor de producción.',
                        steps: [
                            {
                                title: 'Script de aprovisionamiento de servidor (user-data.sh)',
                                explanation: 'Script que instala Docker e inicia el servicio al arrancar el servidor por primera vez.',
                                code: 'cat << \'EOF\' > user-data.sh\n#!/bin/bash\nsudo apt-get update -y\nsudo apt-get install -y docker.io\nsudo systemctl start docker\nsudo systemctl enable docker\nsudo docker run -d -p 80:8000 --restart always --name app-prod python:3.11-slim python -c "import http.server,socketserver; socketserver.TCPServer((\\\"\\\",8000), http.server.SimpleHTTPRequestHandler).serve_forever()"\nEOF',
                                validation: 'Script de arranque listo para usarse en AWS.'
                            }
                        ],
                        quiz: {
                            question: '¿Para qué sirve el parámetro "--restart always" en Docker?',
                            options: [
                                'Para reiniciar el servidor completo cada hora',
                                'Para asegurar que el contenedor se levante automáticamente si falla o se reinicia el servidor',
                                'Para borrar las imágenes de prueba'
                            ],
                            correct: 1
                        },
                        nextSteps: [
                            'Configuración de Virtual Private Cloud (VPC).',
                            'Uso de Security Groups como Firewalls.',
                            'Almacenamiento de datos con Amazon EBS y S3.'
                        ]
                    },
                    {
                        id: 'm5',
                        shortTitle: 'IaC con Terraform',
                        title: '5. Infraestructura como Código con Terraform',
                        duration: '60 min',
                        description: 'Aprovisionamiento declarativo y automatizado de la infraestructura en AWS mediante código.',
                        prerequisites: 'Binario de Terraform instalado localmente.',
                        concept: 'Terraform permite definir servidores, redes y reglas de seguridad en archivos de texto, garantizando entornos replicables y auditables.',
                        steps: [
                            {
                                title: 'Definición de infraestructura (main.tf)',
                                explanation: 'Archivo HCL que describe el servidor EC2 y el Security Group.',
                                code: 'cat << \'EOF\' > main.tf\nterraform {\n  required_providers {\n    aws = {\n      source  = "hashicorp/aws"\n      version = "~> 5.0"\n    }\n  }\n}\n\nprovider "aws" {\n  region = "us-west-2"\n}\n\nresource "aws_security_group" "sg_app" {\n  name = "sg_devops"\n  ingress {\n    from_port   = 80\n    to_port     = 80\n    protocol    = "tcp"\n    cidr_blocks = ["0.0.0.0/0"]\n  }\n  egress {\n    from_port   = 0\n    to_port     = 0\n    protocol    = "-1"\n    cidr_blocks = ["0.0.0.0/0"]\n  }\n}\n\nresource "aws_instance" "web" {\n  ami           = "ami-0075013580f6322a1"\n  instance_type = "t2.micro"\n  vpc_security_group_ids = [aws_security_group.sg_app.id]\n  tags = { Name = "Servidor-Produccion" }\n}\nEOF',
                                validation: 'Sintaxis validada con "terraform fmt".'
                            },
                            {
                                title: 'Inicialización de Terraform',
                                explanation: 'Descarga de módulos y proveedor de AWS.',
                                code: 'terraform init',
                                validation: 'Mensaje de éxito "Terraform has been successfully initialized!".'
                            }
                        ],
                        quiz: {
                            question: '¿Qué comando analiza la diferencia entre tu código y la infraestructura real antes de aplicar cambios?',
                            options: [
                                'terraform apply',
                                'terraform plan',
                                'terraform destroy'
                            ],
                            correct: 1
                        },
                        nextSteps: [
                            'Gestión de estado remoto con S3 y DynamoDB.',
                            'Módulos de Terraform reutilizables.',
                            'Principios de GitOps con ArgoCD o Atlantis.'
                        ]
                    }
                ]
            }
        }
    </script>
</body>
</html>
